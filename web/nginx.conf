server {
    listen 80;
    server_name _;
    server_tokens off;

    # Internal stats API — proxied to the stats container, never exposed directly
    location /api/ {
        proxy_pass http://stats:8080;
        proxy_read_timeout 5s;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}
